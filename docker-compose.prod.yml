version: '3.9'

services:
  backend:
    image: beacon-backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: ./apps/backend/.env.production
    expose:
      - '3000'
    networks:
      - beacon-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: beacon-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    networks:
      - beacon-net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  beacon-net:
    driver: bridge
