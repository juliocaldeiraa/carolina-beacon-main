services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: beacon-backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: ./apps/backend/.env.production
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: beacon-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  redis-data:
