## Integra com o Traefik global do servidor (Docker Swarm)
## - Rede externa: beacon-proxy (onde o Traefik global escuta)
## - Certresolver: letsencryptresolver (HTTP-01, já configurado no Traefik global)
## - Entrypoint: websecure (porta 443)

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: beacon-backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: ./apps/backend/.env.production
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: beacon-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - beacon-proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=beacon-proxy'
      - 'traefik.http.routers.beacon.rule=Host(`beacon.carolinapedrollo.com.br`)'
      - 'traefik.http.routers.beacon.entrypoints=websecure'
      - 'traefik.http.routers.beacon.tls=true'
      - 'traefik.http.routers.beacon.tls.certresolver=letsencryptresolver'
      - 'traefik.http.services.beacon.loadbalancer.server.port=80'

networks:
  beacon-proxy:
    external: true

volumes:
  redis-data:
