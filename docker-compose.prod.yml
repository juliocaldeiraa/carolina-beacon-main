services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: beacon-backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: ./apps/backend/.env.production
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: beacon-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=beacon_traefik'
      - 'traefik.http.routers.beacon.rule=Host(`beacon.carolinapedrollo.com.br`)'
      - 'traefik.http.routers.beacon.entrypoints=websecure'
      - 'traefik.http.routers.beacon.tls=true'
      - 'traefik.http.routers.beacon.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.beacon.middlewares=security-headers@file'
      - 'traefik.http.services.beacon.loadbalancer.server.port=80'

networks:
  traefik:
    name: beacon_traefik

volumes:
  redis-data:
  traefik-letsencrypt:
