version: '3.9'

services:
  backend:
    image: ghcr.io/higrow-auto/beacon-chat-backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: ./apps/backend/.env.production
    expose:
      - '3000'
    networks:
      - admhigrownet
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    image: ghcr.io/higrow-auto/beacon-chat-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    networks:
      - admhigrownet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=admhigrownet
        - traefik.http.routers.beacon.entrypoints=websecure
        - traefik.http.routers.beacon.rule=Host(`beacon.escolatocha.com.br`)
        - traefik.http.routers.beacon.tls.certresolver=letsencryptresolver
        - traefik.http.routers.beacon.service=beacon
        - traefik.http.services.beacon.loadbalancer.server.port=80

networks:
  admhigrownet:
    external: true
