version: '3.9'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - beacon-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: beacon-backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: ./apps/backend/.env.production
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - '3000'
    networks:
      - beacon-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: beacon-frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    networks:
      - beacon-net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:

networks:
  beacon-net:
    driver: bridge
