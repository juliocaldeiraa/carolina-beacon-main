## Traefik static configuration
## Escopo: HTTPS com Let's Encrypt (HTTP-01) + redirect HTTP→HTTPS

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

accessLog: {}

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: beacon_traefik
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: juliocaldeira.gestor@gmail.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
