# Se Traefik termina o TLS, preserva o scheme original (https) em vez de sobrescrever com $scheme (http)
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    ""      $scheme;
    http    http;
    https   https;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend (remove o prefixo /api)
    location /api/ {
        proxy_pass         http://host.docker.internal:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 120s;
    }

    # Proxy /inbound/* → backend (mantém o prefixo)
    location /inbound/ {
        proxy_pass         http://host.docker.internal:3000/inbound/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
