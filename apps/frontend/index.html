<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/voxai-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VoxAI — Sua IA que conversa como gente" />
    <title>VoxAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Anti-flash: aplica tema antes do React renderizar -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('voxai-theme');
          // Default = light. Só aplica .dark se o usuário escolheu explicitamente.
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
